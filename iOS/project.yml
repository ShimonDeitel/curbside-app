name: Curbside
options:
  bundleIdPrefix: com.shimondeitel.canrefund
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Curbside:
    type: application
    platform: iOS
    sources:
      - path: Curbside
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.canrefund
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Curbside/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CurbsideTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CurbsideTests
    dependencies:
      - target: Curbside
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.canrefund.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CurbsideUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CurbsideUITests
    dependencies:
      - target: Curbside
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.canrefund.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Curbside:
    build:
      targets:
        Curbside: all
        CurbsideTests: [test]
        CurbsideUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Curbside.storekit
    test:
      config: Debug
      storeKitConfiguration: Curbside.storekit
      targets:
        - CurbsideTests
        - CurbsideUITests
    archive:
      config: Release
